<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>봉두의 HSK 문법 공부방</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --primary-color: #4ea8de;
            --accent-color: #72efdd;
            --border-color: #e9ecef;
            --level-2-color: #4cc9f0;
            --level-3-color: #4361ee;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .btn-home {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 600;
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background: var(--card-bg);
            transition: all 0.2s;
        }

        .btn-home:hover {
            background: var(--border-color);
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 600px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: #e2e8f0;
            color: #4a5568;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: white;
        }

        #grammar-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .grammar-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .grammar-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0;
        }

        .badge {
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 6px;
            color: white;
            font-weight: 600;
        }
        .badge.hsk2 { background-color: var(--level-2-color); }
        .badge.hsk3 { background-color: var(--level-3-color); }

        .grammar-formula {
            background: #f1f5f9;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.95rem;
            color: #0f172a;
            margin: 8px 0;
            border-left: 4px solid var(--primary-color);
            cursor: pointer;
        }

        .card-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .card-details.show {
            max-height: 2000px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
        }

        .description {
            font-size: 0.95rem;
            color: #475569;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .example-box {
            background: #fafafa;
            border: 1px solid #f1f5f9;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            position: relative;
        }

        .zh-word {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1e293b;
            cursor: pointer;
            border-bottom: 1px dashed #94a3b8;
            margin-right: 2px;
            display: inline-block;
        }
        .zh-word:hover {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .pinyin-text {
            font-size: 0.95rem;
            color: #64748b;
            font-style: italic;
            margin: 6px 0 4px 0;
        }

        .ko-text {
            font-size: 0.95rem;
            color: #334155;
        }

        .btn-speak {
            position: absolute;
            right: 15px;
            top: 15px;
            background: #e2e8f0;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-speak:hover {
            background: #cbd5e1;
        }

        .tip-box {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            color: #334155;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-top: 15px;
            line-height: 1.6;
        }

        .tip-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .freq-badge {
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 800;
            color: white;
            display: inline-block;
        }
        .freq-badge.high { background-color: #ef4444; }
        .freq-badge.medium { background-color: #f59e0b; }
        .freq-badge.low { background-color: #10b981; }

        .tip-content {
            font-size: 0.88rem;
            color: #475569;
            padding-left: 4px;
        }

        .word-tooltip {
            position: absolute;
            background: #1e293b;
            color: #ffffff;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            max-width: 240px;
            pointer-events: none;
            display: none;
            line-height: 1.4;
        }
        .word-tooltip::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px 5px 0;
            border-style: solid;
            border-color: #1e293b transparent;
            display: block;
            width: 0;
        }
    </style>
</head>
<body>

    <header>
        <h2>Grammar 📝</h2>
        <a href="index.html" class="btn-home">Home</a>
    </header>

    <div class="filter-tabs">
        <button class="tab-btn active" onclick="filterLevel('ALL')">전체보기</button>
        <button class="tab-btn" onclick="filterLevel('HSK2')">HSK 2급</button>
        <button class="tab-btn" onclick="filterLevel('HSK3')">HSK 3급</button>
    </div>

    <div id="grammar-container"></div>
    <div id="tooltip" class="word-tooltip"></div>

    <script>
        let grammarData = [];
        let hskDictionary = {}; 
        let currentFilter = 'ALL';

        async function initPage() {
            try {
                const resGrammar = await fetch('./data/grammar.json');
                grammarData = await resGrammar.json();

                const [r1, r2, r3] = await Promise.all([
                    fetch('./data/hsk1.json').then(r => r.json()).catch(() => []),
                    fetch('./data/hsk2.json').then(r => r.json()).catch(() => []),
                    fetch('./data/hsk3.json').then(r => r.json()).catch(() => [])
                ]);

                // 단어 데이터를 병합하여 딕셔너리 구축
                [...r1, ...r2, ...r3].forEach(item => {
                    const wordKey = item.hanzi || item.han || item.word;[cite: 3]
                    
                    if (wordKey) {
                        const pinyinValue = item.pinyin || item.pin || '';[cite: 3]

                        let meaningText = '';
                        if (item.meanings && Array.isArray(item.meanings)) {[cite: 3]
                            meaningText = item.meanings.map(m => {[cite: 3]
                                const posStr = m.pos ? `[${m.pos}] ` : '';[cite: 3]
                                return `${posStr}${m.ko}`;[cite: 3]
                            }).join(', ');
                        } else {
                            meaningText = item.kor || item.meaning || item.mean || '뜻 정보 없음';
                        }

                        hskDictionary[wordKey.trim()] = {
                            meaning: meaningText,
                            pinyin: pinyinValue
                        };
                    }
                });

                renderCards();
            } catch (error) {
                console.error("데이터 로드 실패:", error);
                document.getElementById('grammar-container').innerHTML = "<p>데이터를 불러오는 중 오류가 발생했습니다.</p>";
            }
        }

        function parseTip(tipString) {
            if (!tipString) return '';

            let frequency = '상';
            let freqClass = 'high';
            let desc = tipString;

            const match = tipString.match(/출제\s*빈도\s*([상중하])/);
            if (match) {
                frequency = match[1];
                if (frequency === '중') freqClass = 'medium';
                if (frequency === '하') freqClass = 'low';
            }

            const exclIndex = tipString.indexOf('!');
            if (exclIndex !== -1) {
                desc = tipString.substring(exclIndex + 1).trim();
            }

            return `
                <div class="tip-box">
                    <div class="tip-header">
                        💡 <span>출제 빈도</span> 
                        <span class="freq-badge ${freqClass}">${frequency}</span>
                    </div>
                    <div class="tip-content">
                        ⚡ ${desc}
                    </div>
                </div>
            `;
        }

        function renderCards() {
            const container = document.getElementById('grammar-container');
            container.innerHTML = '';

            const filteredData = grammarData.filter(item => {
                if (currentFilter === 'ALL') return true;
                return item.level === currentFilter;
            });

            filteredData.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'grammar-card';

                let examplesHtml = '';
                item.examples.forEach((ex, exIdx) => {
                    const charArray = Array.from(ex.zh);
                    let parsedZh = '';
                    
                    for(let i = 0; i < charArray.length; i++) {
                        let char = charArray[i];
                        let nextChar = charArray[i+1] || '';
                        let nextNextChar = charArray[i+2] || '';
                        
                        let threeChars = char + nextChar + nextNextChar;
                        let twoChars = char + nextChar;

                        if (hskDictionary[threeChars]) {
                            parsedZh += `<span class="zh-word" onclick="showTooltip(event, '${threeChars}')">${threeChars}</span>`;
                            i += 2; 
                        }
                        else if (hskDictionary[twoChars]) {
                            parsedZh += `<span class="zh-word" onclick="showTooltip(event, '${twoChars}')">${twoChars}</span>`;
                            i++; 
                        } 
                        else if (/[\u4e00-\u9fa5]/.test(char)) {
                            parsedZh += `<span class="zh-word" onclick="showTooltip(event, '${char}')">${char}</span>`;
                        } else {
                            parsedZh += char;
                        }
                    }

                    examplesHtml += `
                        <div class="example-box">
                            <button class="btn-speak" onclick="speakExample(event, '${ex.zh}', '${ex.ko}')">🔊 읽기</button>
                            <div style="padding-right: 50px;">
                                <div class="zh-sentence">${parsedZh}</div>
                                <div class="pinyin-text">${ex.pinyin}</div>
                                <div class="ko-text">${ex.ko}</div>
                            </div>
                        </div>
                    `;
                });

                const formattedTipHtml = parseTip(item.tip);

                card.innerHTML = `
                    <div class="card-header" onclick="toggleCard(this)">
                        <h3 class="grammar-title">${item.title}</h3>
                        <span class="badge ${item.level.toLowerCase()}">${item.level}</span>
                    </div>
                    <div class="grammar-formula" onclick="toggleCard(this)">${item.formula}</div>
                    
                    <div class="card-details">
                        <div class="description">${item.description}</div>
                        ${examplesHtml}
                        ${formattedTipHtml}
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function toggleCard(element) {
            const card = element.closest('.grammar-card');
            const details = card.querySelector('.card-details');
            details.classList.toggle('show');
        }

        function showTooltip(event, word) {
            event.stopPropagation(); 
            const tooltip = document.getElementById('tooltip');
            const match = hskDictionary[word];
            
            if (match) {
                tooltip.innerHTML = `<strong>${word}</strong> [${match.pinyin}]<br>${match.meaning}`;
            } else {
                tooltip.innerHTML = `<strong>${word}</strong><br>단어장 검색 결과 없음`;
            }

            const rect = event.target.getBoundingClientRect();
            tooltip.style.left = `${rect.left + window.scrollX + (rect.width/2) - 80}px`; 
            tooltip.style.top = `${rect.top + window.scrollY - 60}px`;
            tooltip.style.display = 'block';
        }

        document.addEventListener('click', () => {
            document.getElementById('tooltip').style.display = 'none';
        });

        function speakExample(event, zhText, koText) {
            event.stopPropagation(); 
            window.speechSynthesis.cancel();

            const utterances = [
                { text: zhText, lang: 'zh-CN' },
                { text: koText, lang: 'ko-KR' },
                { text: zhText, lang: 'zh-CN' },
                { text: koText, lang: 'ko-KR' }
            ];

            utterances.forEach(item => {
                const utterance = new SpeechSynthesisUtterance(item.text);
                utterance.lang = item.lang;
                utterance.rate = item.lang === 'zh-CN' ? 0.85 : 1.0; 
                window.speechSynthesis.speak(utterance);
            });
        }

        function filterLevel(level) {
            currentFilter = level;
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            const targetIndex = level === 'ALL' ? 0 : level === 'HSK2' ? 1 : 2;
            buttons[targetIndex].classList.add('active');

            renderCards();
        }

        window.onload = initPage;
    </script>
</body>
</html>
