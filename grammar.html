<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>봉두의 HSK 문법 공부방</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --primary-color: #4ea8de;
            --accent-color: #72efdd;
            --border-color: #e9ecef;
            --level-2-color: #4cc9f0;
            --level-3-color: #4361ee;
        }

        body {
            font-family: 'Pretendard', -apple-system, "STHeiti", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .btn-home {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 600;
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background: var(--card-bg);
            transition: all 0.2s;
        }

        .btn-home:hover {
            background: var(--border-color);
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 600px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: #e2e8f0;
            color: #4a5568;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: white;
        }

        #grammar-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .grammar-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .grammar-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0;
        }

        .badge {
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 6px;
            color: white;
            font-weight: 600;
        }
        .badge.hsk2 { background-color: var(--level-2-color); }
        .badge.hsk3 { background-color: var(--level-3-color); }

        .grammar-formula {
            background: #f1f5f9;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.95rem;
            color: #0f172a;
            margin: 8px 0;
            border-left: 4px solid var(--primary-color);
            cursor: pointer;
        }

        .card-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .card-details.show {
            max-height: 2000px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
        }

        .description {
            font-size: 0.95rem;
            color: #475569;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .example-box {
            background: #fafafa;
            border: 1px solid #f1f5f9;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .example-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            width: 100%;
        }

        /* 💡 문법창 예문 한자 폰트 스타일 가독성 최적화 통일 (파란 글씨 제거) */
        .zh-sentence span {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1e293b;
            display: inline-block;
            vertical-align: middle;
            font-family: "PingFang SC", "Lantinghei SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            border: none !important;
        }

        .pinyin-text {
            font-size: 0.95rem;
            color: #64748b;
            font-style: italic;
            margin: 2px 0;
        }

        .ko-text {
            font-size: 0.95rem;
            color: #334155;
            margin-top: 2px;
        }

        .btn-speak {
            background: #e2e8f0;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .btn-speak:hover {
            background: #cbd5e1;
        }

        .tip-box {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            color: #334155;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-top: 15px;
            line-height: 1.6;
        }

        .tip-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .freq-badge {
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 800;
            color: white;
            display: inline-block;
        }
        .freq-badge.high { background-color: #ef4444; }
        .freq-badge.medium { background-color: #f59e0b; }
        .freq-badge.low { background-color: #10b981; }

        .tip-content {
            font-size: 0.88rem;
            color: #475569;
            padding-left: 4px;
        }

        /* 슬림 스타일 연동 툴팁 말풍선 디자인 */
        .word-tooltip {
            position: absolute;
            background: #1e293b;
            color: #ffffff;
            padding: 14px 16px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            z-index: 2000;
            display: none;
            line-height: 1.4;
        }
        .word-tooltip::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px 6px 0;
            border-style: solid;
            border-color: #1e293b transparent;
            display: block;
            width: 0;
        }

        .description table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.88rem; text-align: left; }
        .description th { background-color: #f1f5f9; color: #1e293b; font-weight: 700; padding: 8px 10px; border-bottom: 2px solid #cbd5e1; }
        .description td { padding: 8px 10px; border-bottom: 1px solid #e2e8f0; color: #475569; }
    </style>
</head>
<body>

    <header>
        <h2>Grammar 📝</h2>
        <a href="index.html" class="btn-home">Home</a>
    </header>

    <div class="filter-tabs">
        <button class="tab-btn active" onclick="filterLevel('ALL')">전체보기</button>
        <button class="tab-btn" onclick="filterLevel('HSK2')">HSK 2급</button>
        <button class="tab-btn" onclick="filterLevel('HSK3')">HSK 3급</button>
    </div>

    <div id="grammar-container"></div>
    <div id="tooltip" class="word-tooltip"></div>

    <script src="./js/word-core.js"></script>
    <script>
        let grammarData = [];
        let currentFilter = 'ALL';

        async function initPage() {
            try {
                await loadMasterDictionary('all');

                const resGrammar = await fetch('./data/grammar.json');
                grammarData = await resGrammar.json();

                renderCards();
            } catch (error) {
                console.error("데이터 로드 실패:", error);
                document.getElementById('grammar-container').innerHTML = "<p>데이터를 불러오는 중 오류가 발생했습니다.</p>";
            }
        }

        function parseTip(tipString) {
            if (!tipString) return '';
            let frequency = '상';
            let freqClass = 'high';
            let desc = tipString;

            const match = tipString.match(/출제\s*빈도\s*([상중하])/);
            if (match) {
                frequency = match[1];
                if (frequency === '중') freqClass = 'medium';
                if (frequency === '하') freqClass = 'low';
            }

            const exclIndex = tipString.indexOf('!');
            if (exclIndex !== -1) {
                desc = tipString.substring(exclIndex + 1).trim();
            }

            return `
                <div class="tip-box">
                    <div class="tip-header">
                        💡 <span>출제 빈도</span> 
                        <span class="freq-badge ${freqClass}">${frequency}</span>
                    </div>
                    <div class="tip-content">
                        ⚡ ${desc}
                    </div>
                </div>
            `;
        }

        function renderCards() {
            const container = document.getElementById('grammar-container');
            container.innerHTML = '';

            const filteredData = grammarData.filter(item => {
                if (currentFilter === 'ALL') return true;
                return item.level === currentFilter;
            });

            filteredData.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'grammar-card';

                let examplesHtml = '';
                item.examples.forEach((ex) => {
                    const parsedZh = parseHanziToTooltip(ex.zh);

                    examplesHtml += `
                        <div class="example-box">
                            <div class="example-header">
                                <div class="zh-sentence">${parsedZh}</div>
                                <button class="btn-speak" onclick="speakExample(event, '${ex.zh}', '${ex.ko}')">🔊 읽기</button>
                            </div>
                            <div class="pinyin-text">${ex.pinyin}</div>
                            <div class="ko-text">${ex.ko}</div>
                        </div>
                    `;
                });

                const formattedTipHtml = parseTip(item.tip);

                card.innerHTML = `
                    <div class="card-header" onclick="toggleCard(this)">
                        <h3 class="grammar-title">${item.title}</h3>
                        <span class="badge ${item.level.toLowerCase()}">${item.level}</span>
                    </div>
                    <div class="grammar-formula" onclick="toggleCard(this)">${item.formula}</div>
                    
                    <div class="card-details">
                        <div class="description">${item.description}</div>
                        ${examplesHtml}
                        ${formattedTipHtml}
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function toggleCard(element) {
            const card = element.closest('.grammar-card');
            const details = card.querySelector('.card-details');
            details.classList.toggle('show');
        }

        function speakExample(event, zhText, koText) {
            event.stopPropagation(); 
            window.speechSynthesis.cancel();

            const utterances = [
                { text: zhText, lang: 'zh-CN' },
                { text: koText, lang: 'ko-KR' },
                { text: zhText, lang: 'zh-CN' },
                { text: koText, lang: 'ko-KR' }
            ];

            utterances.forEach(item => {
                const utterance = new SpeechSynthesisUtterance(item.text);
                utterance.lang = item.lang;
                utterance.rate = item.lang === 'zh-CN' ? 0.85 : 1.0; 
                window.speechSynthesis.speak(utterance);
            });
        }

        function filterLevel(level) {
            currentFilter = level;
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            const targetIndex = level === 'ALL' ? 0 : level === 'HSK2' ? 1 : 2;
            buttons[targetIndex].classList.add('active');

            renderCards();
        }

        window.onload = initPage;
    </script>
</body>
</html>
